<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPERION v1.1 - Reasoning Amplification Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #00ff88;
    font-family: 'JetBrains Mono', 'Vazirmatn', monospace;
    overflow: hidden;
    height: 100vh;
  }

  #neural-bg {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    opacity: 0.25;
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 56px 1fr 72px;
    gap: 10px;
    padding: 10px;
    height: 100vh;
  }

  .header {
    grid-column: 1/-1;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,255,136,0.04);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 8px;
    padding: 0 16px;
  }

  .logo {
    font-size: 18px; font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
    letter-spacing: 3px;
  }
  .logo span { color: #00ccff; }

  .status-bar {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    transition: all 0.3s;
  }
  .dot.idle { background: #555; }
  .dot.busy { background: #ffcc00; animation: blink 0.5s infinite; }
  .dot.think { background: #00ff88; animation: pulse-glow 0.8s infinite; }
  .dot.done { background: #00ff88; }
  .dot.err { background: #ff0044; }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 5px #00ff88; }
    50% { box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
  }

  .main-panel {
    display: flex; flex-direction: column; gap: 10px; overflow: hidden;
  }

  .reasoning-tree {
    flex: 1; overflow-y: auto;
    background: rgba(0,255,136,0.02);
    border: 1px solid rgba(0,255,136,0.12);
    border-radius: 8px;
    padding: 12px;
  }

  .reasoning-tree::-webkit-scrollbar { width: 3px; }
  .reasoning-tree::-webkit-scrollbar-track { background: rgba(0,255,136,0.05); }
  .reasoning-tree::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.25); border-radius: 2px; }

  .thought-node {
    margin-bottom: 6px;
    padding: 6px 10px 6px 16px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.5;
    animation: slideIn 0.25s ease-out;
    position: relative;
  }

  .thought-node::before {
    content: '';
    position: absolute;
    left: 4px; top: 8px; bottom: 8px;
    width: 2px;
    border-radius: 1px;
  }

  .thought-node.t-decompose { background: rgba(255,204,0,0.06); }
  .thought-node.t-decompose::before { background: #ffcc00; }
  .thought-node.t-explore { background: rgba(0,204,255,0.06); }
  .thought-node.t-explore::before { background: #00ccff; }
  .thought-node.t-reason { background: rgba(0,255,136,0.06); }
  .thought-node.t-reason::before { background: #00ff88; }
  .thought-node.t-critic { background: rgba(255,102,0,0.06); }
  .thought-node.t-critic::before { background: #ff6600; }
  .thought-node.t-synthesis { background: rgba(204,0,255,0.06); }
  .thought-node.t-synthesis::before { background: #cc00ff; }
  .thought-node.t-verify { background: rgba(255,0,102,0.06); }
  .thought-node.t-verify::before { background: #ff0066; }
  .thought-node.t-reflect { background: rgba(0,255,204,0.06); }
  .thought-node.t-reflect::before { background: #00ffcc; }
  .thought-node.t-complete { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2); }
  .thought-node.t-complete::before { background: #00ff88; }
  .thought-node.t-error { background: rgba(255,0,68,0.08); border: 1px solid rgba(255,0,68,0.2); }
  .thought-node.t-error::before { background: #ff0044; }

  .thought-node .tag {
    display: inline-block;
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    padding: 1px 6px; border-radius: 3px;
    margin-bottom: 3px;
  }
  .thought-node .tag { background: rgba(255,255,255,0.06); }
  .thought-node.t-decompose .tag { color: #ffcc00; }
  .thought-node.t-explore .tag { color: #00ccff; }
  .thought-node.t-reason .tag { color: #00ff88; }
  .thought-node.t-critic .tag { color: #ff6600; }
  .thought-node.t-complete .tag { color: #00ff88; }
  .thought-node.t-error .tag { color: #ff0044; }

  .thought-node .body {
    font-family: 'Vazirmatn', sans-serif;
    font-size: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .thought-node .body strong { color: #fff; }

  .sp-status {
    display: flex; gap: 6px;
    margin: 4px 0;
  }
  .sp-pill {
    padding: 2px 8px; border-radius: 10px;
    font-size: 9px; font-weight: 500;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
  }
  .sp-pill.active { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.1); }
  .sp-pill.done { border-color: #00ff88; color: #00ff88; }
  .sp-pill.wait { border-color: #555; }

  .stats-panel {
    display: flex; flex-direction: column; gap: 6px;
  }

  .stat-card {
    background: rgba(0,255,136,0.02);
    border: 1px solid rgba(0,255,136,0.12);
    border-radius: 6px;
    padding: 8px 12px;
    flex: 1;
  }
  .stat-card .lbl { font-size: 9px; letter-spacing: 1.5px; opacity: 0.4; margin-bottom: 2px; }
  .stat-card .val {
    font-size: 22px; font-weight: 700;
    text-shadow: 0 0 8px rgba(0,255,136,0.2);
    transition: all 0.3s;
  }
  .stat-card .val.pop { animation: pop 0.4s ease; }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

  .footer {
    grid-column: 1/-1;
    background: rgba(0,255,136,0.02);
    border: 1px solid rgba(0,255,136,0.12);
    border-radius: 8px;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 12px;
  }

  .progress-wrap { flex: 1; }
  .progress-bar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #00ff88, #00ccff, #cc00ff);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 10px; margin-top: 3px; opacity: 0.4; }

  .input-area { display: flex; gap: 6px; min-width: 300px; }
  .input-area input {
    flex: 1;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 4px;
    padding: 6px 10px;
    color: #00ff88;
    font-family: 'Vazirmatn', 'JetBrains Mono', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0,255,136,0.15); }
  .input-area input::placeholder { color: rgba(0,255,136,0.2); }
  .input-area input:disabled { opacity: 0.4; }

  .btn {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 4px;
    padding: 6px 16px;
    color: #00ff88;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 12px rgba(0,255,136,0.15); }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .scanlines {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 999; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }
</style>
</head>
<body>

<canvas id="neural-bg"></canvas>
<div class="scanlines"></div>

<div class="container">
  <div class="header">
    <div class="logo">HYPERION <span>v1.1</span></div>
    <div class="status-bar">
      <span id="phase-label">IDLE</span>
      <div class="dot idle" id="status-dot"></div>
    </div>
  </div>

  <div class="main-panel">
    <div class="reasoning-tree" id="thought-tree">
      <div class="thought-node t-complete" style="opacity:0.6">
        <div class="tag">🚀 READY</div>
        <div class="body">یک سوال بپرس تا قدرت Hyperion رو ببینی...</div>
      </div>
    </div>
    <div class="sp-status" id="sp-bar"></div>
  </div>

  <div class="stats-panel">
    <div class="stat-card"><div class="lbl">SUB-PROBLEMS</div><div class="val" id="stat-subs">0</div></div>
    <div class="stat-card"><div class="lbl">DEPTH</div><div class="val" id="stat-depth">2</div></div>
    <div class="stat-card"><div class="lbl">PATHS</div><div class="val" id="stat-paths">2</div></div>
    <div class="stat-card"><div class="lbl">TOKENS</div><div class="val" id="stat-tokens">0</div></div>
    <div class="stat-card"><div class="lbl">TIME</div><div class="val" id="stat-time">0s</div></div>
  </div>

  <div class="footer">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0% — Ready</div>
    </div>
    <div class="input-area">
      <input type="text" id="question-input" placeholder="سوالت رو بپرس..." dir="rtl">
      <button class="btn" id="ask-btn">ASK</button>
      <button class="btn" id="clear-btn" style="background:transparent;border-color:rgba(255,255,255,0.1);color:#888">CLEAR</button>
    </div>
  </div>
</div>

<script>
// === Neural Background ===
const canvas = document.getElementById('neural-bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const N = 60;
const neurons = [];
for (let i = 0; i < N; i++) {
  neurons.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    r: 1.5 + Math.random() * 3,
    pulse: 0
  });
}

let packets = [];

function spawnPackets(count = 3) {
  for (let i = 0; i < count; i++) {
    const from = neurons[Math.floor(Math.random() * N)];
    let to;
    do { to = neurons[Math.floor(Math.random() * N)]; } while (to === from);
    packets.push({
      from, to, progress: 0,
      speed: 0.015 + Math.random() * 0.025,
      color: ['#0f8','#0cf','#fc0','#c0f','#f06'][Math.floor(Math.random() * 5)]
    });
  }
}

function drawNeural() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const dx = neurons[i].x - neurons[j].x;
      const dy = neurons[i].y - neurons[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 180) {
        ctx.beginPath();
        ctx.moveTo(neurons[i].x, neurons[i].y);
        ctx.lineTo(neurons[j].x, neurons[j].y);
        ctx.strokeStyle = `rgba(0,255,136,${0.04 * (1 - dist / 180)})`;
        ctx.stroke();
      }
    }
  }

  neurons.forEach(n => {
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
    if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    n.pulse = Math.max(0, n.pulse - 0.008);

    const r = n.r + n.pulse * 4;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,136,${0.2 + n.pulse * 0.8})`;
    ctx.fill();
    if (n.pulse > 0.5) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 8, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,255,136,${n.pulse * 0.2})`;
      ctx.stroke();
    }
  });

  packets = packets.filter(p => {
    p.progress += p.speed;
    if (p.progress >= 1) return false;
    const x = p.from.x + (p.to.x - p.from.x) * p.progress;
    const y = p.from.y + (p.to.y - p.from.y) * p.progress;
    const a = 1 - Math.abs(p.progress - 0.5) * 2;
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    return true;
  });

  requestAnimationFrame(drawNeural);
}

drawNeural();
setInterval(() => { if (Math.random() < 0.03) spawnPackets(2); }, 200);

// === UI Logic ===
const tree = document.getElementById('thought-tree');
const dot = document.getElementById('status-dot');
const phaseLabel = document.getElementById('phase-label');
const progressFill = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');
const statSubs = document.getElementById('stat-subs');
const statDepth = document.getElementById('stat-depth');
const statPaths = document.getElementById('stat-paths');
const statTokens = document.getElementById('stat-tokens');
const statTime = document.getElementById('stat-time');
const input = document.getElementById('question-input');
const askBtn = document.getElementById('ask-btn');
const clearBtn = document.getElementById('clear-btn');
const spBar = document.getElementById('sp-bar');

let busy = false;
let startTime = 0;
let totalTokens = 0;

function setPhase(state, label) {
  dot.className = 'dot ' + state;
  phaseLabel.textContent = label;
}

function addNode(type, html) {
  const div = document.createElement('div');
  div.className = `thought-node t-${type}`;
  const tags = {
    decompose: '🔍 DECOMPOSE', explore: '🛤️ EXPLORE', reason: '💭 REASON',
    critic: '🔧 CRITIQUE', synthesis: '🔄 SYNTHESIS', verify: '✅ VERIFY',
    reflect: '🪞 REFLECT', complete: '🏆 COMPLETE', error: '❌ ERROR',
    info: 'ℹ️ INFO'
  };
  div.innerHTML = `<div class="tag">${tags[type] || type.toUpperCase()}</div><div class="body">${html}</div>`;
  tree.appendChild(div);
  tree.scrollTop = tree.scrollHeight;
}

function updateProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${Math.round(pct)}% — ${label}`;
}

function updateSpBar(total, active) {
  let html = '';
  for (let i = 0; i < total; i++) {
    const cls = i < active ? 'done' : (i === active ? 'active' : 'wait');
    html += `<div class="sp-pill ${cls}">SP${i + 1}</div>`;
  }
  spBar.innerHTML = html;
}

function updateStat(id, val, anim = false) {
  const el = document.getElementById(id);
  el.textContent = val;
  if (anim) { el.className = 'val pop'; setTimeout(() => el.className = 'val', 400); }
}

async function askHyperion(question) {
  if (busy) return;
  busy = true;
  askBtn.disabled = true;
  input.disabled = true;
  startTime = Date.now();
  totalTokens = 0;

  tree.innerHTML = '';
  spBar.innerHTML = '';
  updateProgress(0, 'Starting...');
  setPhase('busy', 'INIT');
  updateStat('stat-time', '0s');
  updateStat('stat-tokens', '0');

  addNode('info', `Question: <strong>${question}</strong>`);

  try {
    const resp = await fetch('/api/hyperion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, stream: true })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.trim() || !line.startsWith('data: ')) continue;
        try {
          const msg = JSON.parse(line.slice(6));
          handleMsg(msg);
        } catch (e) {}
      }
    }
  } catch (err) {
    addNode('error', `Connection error: ${err.message}`);
  }

  busy = false;
  askBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

function handleMsg(msg) {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  updateStat('stat-time', `${elapsed}s`);

  switch (msg.type) {
    case 'start':
      setPhase('think', 'THINKING');
      updateProgress(5, 'Initializing');
      break;

    case 'decompose':
      updateStat('stat-subs', msg.subProblems || 0, true);
      setPhase('think', 'DECOMPOSING');
      updateProgress(10, 'Decomposing problem');
      updateSpBar(msg.subProblems || 0, -1);
      addNode('decompose', msg.content);
      if (msg.list) {
        const list = msg.list.map((s, i) => `<strong>SP${i+1}:</strong> ${s}`).join('<br>');
      }
      spawnPackets(8);
      break;

    case 'explore':
      setPhase('think', 'EXPLORING');
      updateProgress(25, 'Exploring paths');
      updateStat('stat-paths', msg.paths || 0, true);
      addNode('explore', msg.content);
      updateSpBar(parseInt(statSubs.textContent) || 3, (msg.subProblem || 1) - 1);
      spawnPackets(6);
      break;

    case 'reason':
      setPhase('think', 'REASONING');
      const pct = 30 + ((msg.subProblem || 0) / Math.max(parseInt(statSubs.textContent) || 3, 1)) * 30;
      updateProgress(pct, `Reasoning deep...`);
      addNode('reason', msg.content);
      totalTokens += (msg.content || '').length / 4;
      updateStat('stat-tokens', Math.round(totalTokens));
      for (let i = 0; i < 5; i++) spawnPackets(4);
      neurons.forEach(n => { if (Math.random() < 0.08) n.pulse = 1; });
      break;

    case 'critic':
      setPhase('think', 'CRITIQUING');
      updateProgress(60, 'Self-critique');
      addNode('critic', msg.content);
      break;

    case 'synthesize':
      setPhase('think', 'SYNTHESIZING');
      updateProgress(75, 'Synthesizing');
      break;

    case 'synthesis':
      updateProgress(80, 'Synthesis complete');
      addNode('synthesis', msg.content);
      break;

    case 'verify':
      setPhase('think', 'VERIFYING');
      updateProgress(88, 'Verifying');
      addNode('verify', msg.content);
      break;

    case 'reflect':
      setPhase('think', 'REFLECTING');
      updateProgress(94, 'Meta-reflection');
      addNode('reflect', msg.content);
      break;

    case 'complete':
      setPhase('done', 'COMPLETE');
      updateProgress(100, 'Complete!');
      addNode('complete', msg.content);
      updateStat('stat-tokens', Math.round(msg.tokens || totalTokens), true);
      for (let i = 0; i < 15; i++) spawnPackets(10);
      neurons.forEach(n => { n.pulse = 1; });
      break;

    case 'error':
      setPhase('err', 'ERROR');
      addNode('error', msg.content);
      break;

    case 'info':
      addNode('info', msg.content);
      break;
  }
}

// === Event handlers ===
askBtn.addEventListener('click', () => {
  const q = input.value.trim();
  if (q) askHyperion(q);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const q = input.value.trim();
    if (q) askHyperion(q);
  }
});

clearBtn.addEventListener('click', () => {
  tree.innerHTML = '';
  spBar.innerHTML = '';
  updateProgress(0, 'Cleared');
  updateStat('stat-subs', '0');
  updateStat('stat-paths', '0');
  updateStat('stat-tokens', '0');
  updateStat('stat-time', '0s');
  setPhase('idle', 'IDLE');
  addNode('info', 'Ready for next question.');
});
</script>
</body>
</html>
